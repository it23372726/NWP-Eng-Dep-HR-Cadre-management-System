# Production profile for Render (and similar hosts).
# Activate with: SPRING_PROFILES_ACTIVE=prod
# Do not put real credentials in this file — use environment variables.

server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslMode=REQUIRED&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
debug=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.frontend-url=${FRONTEND_URL}

# Bootstrap only when users table is empty. Password must come from the environment.
hrms.bootstrap.super-admin.enabled=${HRMS_BOOTSTRAP_SUPER_ADMIN_ENABLED:true}
hrms.bootstrap.super-admin.username=${HRMS_BOOTSTRAP_SUPER_ADMIN_USERNAME:superadmin}
hrms.bootstrap.super-admin.password=${HRMS_BOOTSTRAP_SUPER_ADMIN_PASSWORD:}
