spring.application.name=hrms

spring.datasource.url=jdbc:mysql://localhost:3306/nwp_hrms?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=REMOVED_DB_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
debug=true
server.port=8080

jwt.secret=REMOVED_JWT_SECRET
jwt.expiration=86400000

hrms.uploads.employee-photos-dir=./uploads/employee-photos
hrms.uploads.employee-photo-max-size-bytes=5242880

hrms.bootstrap.super-admin.enabled=true
hrms.bootstrap.super-admin.username=superadmin
hrms.bootstrap.super-admin.password=admin123