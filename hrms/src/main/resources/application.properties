spring.application.name=hrms

# Local MySQL — override with DB_* env vars if needed.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nwp_hrms_host?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
debug=true
server.port=8080

# Override JWT_SECRET in any non-local environment.
jwt.secret=${JWT_SECRET:change-me-local-dev-only-use-a-long-random-secret}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Used by CORS (local Vite default). Override with FRONTEND_URL in production.
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

hrms.uploads.employee-photos-dir=./uploads/employee-photos
hrms.uploads.employee-photo-max-size-bytes=5242880

# Only bootstrap account created on an empty database.
hrms.bootstrap.super-admin.enabled=${HRMS_BOOTSTRAP_SUPER_ADMIN_ENABLED:true}
hrms.bootstrap.super-admin.username=${HRMS_BOOTSTRAP_SUPER_ADMIN_USERNAME:superadmin}
hrms.bootstrap.super-admin.password=${HRMS_BOOTSTRAP_SUPER_ADMIN_PASSWORD:admin123}
